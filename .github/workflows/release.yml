name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/svalko.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=svalko.keystore
          EOF

      - run: flutter pub get

      - name: Build APKs
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=APP_SECRET=${{ secrets.APP_SECRET }} \
            --dart-define=CRASH_WORKER_URL=${{ secrets.CRASH_WORKER_URL }}

      - name: Rename APKs
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk   svalko-client-${VERSION}-arm64.apk
          mv app-armeabi-v7a-release.apk svalko-client-${VERSION}-arm32.apk
          mv app-x86_64-release.apk      svalko-client-${VERSION}-x64.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/svalko-client-*.apk
          generate_release_notes: true
          draft: false
